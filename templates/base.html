<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Менеджер задач</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .header a { color: white; margin-right: 20px; text-decoration: none; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 8px 15px; border-radius: 5px; text-decoration: none; margin: 5px; }
        .btn-add { background: #27ae60; color: white; }
        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-new { background: #95a5a6; }
        .btn-work { background: #f39c12; }
        .btn-done { background: #27ae60; }
        .status { padding: 3px 10px; border-radius: 15px; font-size: 12px; }
        .status.new { background: #95a5a6; color: white; }
        .status.work { background: #f39c12; color: white; }
        .status.done { background: #27ae60; color: white; }
        .filters { margin-bottom: 20px; }
        .stats { background: #ecf0f1; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .flash { padding: 10px; background: #d4edda; color: #155724; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Менеджер задач проекта</h1>
            <a href="/">Главная</a>
            <a href="/add">➕ Добавить задачу</a>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
